<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bag body -->
  <circle cx="16" cy="21.5" r="9.5" fill="#1A3F52"/>

  <!-- Upper pouch section -->
  <path d="M 11.5 17.5 Q 11.5 12.5 16 12.5 Q 20.5 12.5 20.5 17.5 L 19.5 19.5 Q 16 21 12.5 19.5 Z"
        fill="#2C6070"/>

  <!-- Gold cinch band -->
  <rect x="11.5" y="14.5" width="9" height="3" rx="1.5" fill="#E8B44A"/>

  <!-- Bag highlight (subtle) -->
  <ellipse cx="12" cy="21" rx="2.5" ry="3" fill="#22526A" opacity="0.7"/>

  <!-- Dollar sign -->
  <text x="16" y="27" text-anchor="middle"
        font-size="13" font-weight="900" fill="#F0C040"
        font-family="Georgia, 'Times New Roman', serif">$</text>
</svg>
